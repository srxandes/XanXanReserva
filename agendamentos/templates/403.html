<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso negado | NTI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
        }
        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 400px;
            background: radial-gradient(circle at top right, #fffbeb 0%, #f8fafc 70%);
            z-index: -1;
        }
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            color: #fef3c7;
            line-height: 1;
            letter-spacing: -4px;
        }
        .error-icon {
            width: 80px; height: 80px;
            background: #fffbeb;
            color: #f59e0b;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }
        .btn-home {
            background: #f59e0b;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 10px 28px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-home:hover { background: #d97706; color: #fff; transform: translateY(-2px); }
        .btn-back {
            background: #fff;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 28px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-back:hover { background: #f1f5f9; color: var(--text-main); }
    </style>
</head>
<body>
    <div class="text-center px-3">
        <div class="error-code">403</div>
        <div class="error-icon mx-auto">
            <i class="bi bi-shield-lock"></i>
        </div>
        <h1 class="fw-800 mb-2" style="font-weight:800;">Acesso negado</h1>
        <p class="text-muted mb-4" style="max-width:400px; margin:0 auto 1.5rem;">
            Você não tem permissão para acessar esta página. Se acredita que isso é um erro, contate o NTI.
        </p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="/" class="btn-home">🏠 Voltar ao início</a>
            <a href="javascript:history.back()" class="btn-back">← Página anterior</a>
        </div>
        <p class="mt-5 small text-muted">Em caso de dúvidas, entre em contato com o <strong>NTI</strong>.</p>
    </div>
</body>
</html>
